<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lahore Qalandars – Playing XI</title>

    <!-- Bootstrap CSS (W3 / CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .player-img {
            height: 250px;
            object-fit: cover;   /* Deep Skill: image fluidity */
        }
    </style>
</head>
<body>

<div class="container my-5">

    <h1 class="text-center mb-4">Lahore Qalandars – Playing XI</h1>

    <div class="row g-4">
        <!-- Player 1 -->
        <div class="col-md-3 col-sm-6 col-12">
            <div class="card">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x250" class="card-img-top player-img" alt="Captain">
                    <span class="badge bg-danger position-absolute top-0 start-0 m-2">Captain</span>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title">Shaheen Afridi</h5>
                </div>
            </div>
        </div>

        <!-- Player 2 -->
        <div class="col-md-3 col-sm-6 col-12">
            <div class="card">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x250" class="card-img-top player-img" alt="Wicket Keeper">
                    <span class="badge bg-success position-absolute top-0 start-0 m-2">Wicket Keeper</span>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title">Sam Billings</h5>
                </div>
            </div>
        </div>

        <!-- Player 3 -->
        <div class="col-md-3 col-sm-6 col-12">
            <div class="card">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x250" class="card-img-top player-img" alt="Foreign Player">
                    <span class="badge bg-warning text-dark position-absolute top-0 start-0 m-2">Foreign Player</span>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title">David Wiese</h5>
                </div>
            </div>
        </div>

        <!-- Player 4 -->
        <div class="col-md-3 col-sm-6 col-12">
            <div class="card">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x250" class="card-img-top player-img" alt="All Rounder">
                    <span class="badge bg-primary position-absolute top-0 start-0 m-2">All-Rounder</span>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title">Sikandar Raza</h5>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
