<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Git Conflict Simulation - Tailwind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col justify-between bg-gradient-to-br from-indigo-600 to-purple-600">

  <!-- Centered Content -->
  <div class="flex flex-1 items-center justify-center">

    <!-- Login Card -->
    <div class="bg-white p-8 rounded-2xl w-80 shadow-2xl text-center">

      <h2 class="text-2xl font-bold mb-4 text-gray-800">
        Login
      </h2>

      <form class="space-y-4">
        <input 
          type="text" 
          placeholder="Username" 
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >

        <input 
          type="password" 
          placeholder="Password" 
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >

        <button 
          type="submit"
          class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-800 transition duration-300"
        >
          Sign In
        </button>
      </form>

    </div>

  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white text-center py-4">
    © 2026 My Website | All Rights Reserved
  </footer>

</body>
</html>
