<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chai Dhaba Rate List</title>

<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    min-height: 100vh;
    background-color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Main Card */
.container{
    background-color: salmon;
    padding: 25px;
    border-radius: 15px;
    width: 500px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align: center;
    margin-bottom: 10px;
    color: #003333;
}

/* COUNTER */
#counter{
    text-align: center;
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #222;
}

/* FLEX CONTAINER */
.menu{
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

/* MENU ITEMS */
.item{
    flex: 0 0 200px;
    background-color: #f2f2f2;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.item p{
    font-size: 16px;
    font-weight: bold;
}

.price{
    color: darkred;
    margin-top: 5px;
    font-size: 14px;
}

.item:hover{
    background-color:rgb(82, 230, 222);
    transform: scale(1.03);
    transition: 0.3s;
}

/* BUTTONS CONTAINER */
.buttons{
    margin-top: 25px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

/* BUTTON STYLE */
.buttons button{
    padding: 12px 20px;
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #f2f2f2;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

/* BUTTON HOVER */
.buttons button:hover{
    background-color: #003333;
    color: white;
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="container">
    <h2>Chai Dhaba Rate List</h2>

    <!-- COUNTER -->
    <div id="counter">0</div>

    <!-- MENU -->
    <div class="menu">
        <div class="item"><p>Samosa</p><div class="price">Price: 100</div></div>
        <div class="item"><p>Chai</p><div class="price">Price: 100</div></div>
        <div class="item"><p>Jalebi</p><div class="price">Price: 400</div></div>
        <div class="item"><p>Shami Burger</p><div class="price">Price: 150</div></div>
        <div class="item"><p>Pratha</p><div class="price">Price: 100</div></div>
        <div class="item"><p>Fries</p><div class="price">Price: 250</div></div>
        <div class="item"><p>Egg-Roll</p><div class="price">Price: 220</div></div>
        <div class="item"><p>Nestle Water</p><div class="price">Price: 90</div></div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button id="addBtn">Add Chai</button>
        <button id="removeBtn">Remove Chai</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
